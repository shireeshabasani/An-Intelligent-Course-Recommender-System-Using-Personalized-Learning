version: '3.8'
services:
  mongo:
    image: mongo:6.0
    container_name: crm_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: crm_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/course_reco
    depends_on:
      - mongo

volumes:
  mongo_data:
